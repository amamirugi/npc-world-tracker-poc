name: Assemble plugin

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/assemble.yml'

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble and verify
        shell: bash
        run: |
          set -euo pipefail
          cat \
            bootstrap/part_00.b64 \
            bootstrap/part_01.b64 \
            bootstrap/part_02_00.b64 \
            bootstrap/part_02_01.b64 \
            bootstrap/part_02_02.b64 \
            bootstrap/part_02_03.b64 \
            bootstrap/part_03_00.b64 \
            > plugin.js.gz.b64
          base64 -d plugin.js.gz.b64 > plugin.js.gz
          gzip -dc plugin.js.gz > npc-world-tracker-poc.js
          echo '982d6a8776d3d96d13998f6c2f940298dbe1da54621ff499d441d0d1a142d8a4  npc-world-tracker-poc.js' | sha256sum -c -
          rm -f plugin.js.gz plugin.js.gz.b64
      - name: Commit assembled plugin
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -r bootstrap .github/workflows/assemble.yml
          git add npc-world-tracker-poc.js
          git commit -m 'feat: publish NPC World Tracker v0.3.3'
          git push
